name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-import:
    name: Lint & import check
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-usb \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-dbusmenu-glib-0.4

      - name: Syntax check
        run: |
          python3 -m py_compile src/pulsar_mouse/__init__.py
          python3 -m py_compile src/pulsar_mouse/base.py
          python3 -m py_compile src/pulsar_mouse/hid.py
          python3 -m py_compile src/pulsar_mouse/cli.py
          python3 -m py_compile src/pulsar_mouse/gui.py
          python3 -m py_compile src/pulsar_mouse/drivers/__init__.py
          python3 -m py_compile src/pulsar_mouse/drivers/x2a.py
          python3 -m py_compile src/pulsar_mouse/drivers/x2h.py
          python3 -m py_compile src/pulsar_mouse/drivers/xlite_v4.py
          echo "Syntax OK"

      - name: Import check (backend)
        env:
          PYTHONPATH: src
        run: |
          python3 -c "
          from pulsar_mouse import scan_devices, find_device, __version__
          from pulsar_mouse.base import PulsarDevice, DeviceCapabilities
          from pulsar_mouse.hid import describe_button, parse_button_function
          from pulsar_mouse.drivers import discover_all
          from pulsar_mouse.drivers.x2a import PulsarX2A
          print(f'Backend imports OK — v{__version__}')
          print(f'Drivers: {list(discover_all())}')
          print(f'X2A caps: {PulsarX2A.capabilities.name}')
          "

      - name: Import check (GUI — no display needed)
        run: |
          python3 -c "
          import gi
          gi.require_version('Gtk', '4.0')
          gi.require_version('Adw', '1')
          gi.require_version('Dbusmenu', '0.4')
          from gi.repository import Gtk, Adw, GLib, Gio, Dbusmenu
          print('GUI imports OK')
          "
