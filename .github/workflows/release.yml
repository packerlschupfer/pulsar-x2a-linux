name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            fakeroot

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build .deb
        run: |
          PKG=pulsar-x2a-linux
          VER=$VERSION
          ARCH=all
          DIR="${PKG}_${VER}_${ARCH}"

          # Package tree
          mkdir -p "${DIR}/DEBIAN"
          mkdir -p "${DIR}/usr/local/bin"
          mkdir -p "${DIR}/usr/share/applications"
          mkdir -p "${DIR}/etc/udev/rules.d"

          # Files
          mkdir -p "${DIR}/usr/lib/python3/dist-packages"
          install -m 755 pulsar_x2a.py     "${DIR}/usr/local/bin/pulsar-x2a"
          install -m 644 pulsar_x2a.py     "${DIR}/usr/lib/python3/dist-packages/pulsar_x2a.py"
          install -m 755 pulsar_x2a_gui.py "${DIR}/usr/local/bin/pulsar-x2a-gui"
          install -m 644 50-pulsar-x2a.rules \
            "${DIR}/etc/udev/rules.d/50-pulsar-x2a.rules"

          # Desktop entry
          cat > "${DIR}/usr/share/applications/pulsar-x2a.desktop" << EOF
          [Desktop Entry]
          Name=Pulsar X2A
          Comment=Configure Pulsar X2A mouse settings
          Exec=pulsar-x2a-gui
          Icon=input-mouse
          Type=Application
          Categories=Settings;HardwareSettings;
          Keywords=mouse;gaming;dpi;pulsar;
          StartupNotify=true
          EOF

          # control file
          cat > "${DIR}/DEBIAN/control" << EOF
          Package: pulsar-x2a-linux
          Version: ${VER}
          Architecture: ${ARCH}
          Maintainer: packerlschupfer
          Depends: python3, python3-usb, python3-gi, gir1.2-gtk-4.0, gir1.2-adw-1, gir1.2-dbusmenu-glib-0.4
          Description: Linux configuration tool for the Pulsar X2A Medium Wired mouse
           Reverse-engineered USB HID tool providing a CLI and GTK4/libadwaita
           settings GUI with system-tray applet.
          EOF

          # postinst: reload udev rules
          cat > "${DIR}/DEBIAN/postinst" << 'EOF'
          #!/bin/sh
          set -e
          udevadm control --reload-rules || true
          udevadm trigger || true
          EOF
          chmod 755 "${DIR}/DEBIAN/postinst"

          fakeroot dpkg-deb --build "${DIR}"
          echo "DEB_PATH=${DIR}.deb" >> "$GITHUB_ENV"

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
          generate_release_notes: true
